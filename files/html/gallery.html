<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dummy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@100..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/c73bc397e5.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/style.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
    <header>
        <div class="container" id="icons-desktop">
            <div class="row">
            <div class="col-xl-6 col-md-12 col-sm-12">
                <h3 class="logo">Mz</h3>
            </div>
            <div class="col-xl-6 col-md-12 col-sm-12">
                <ul class="nav-list">
                <li class="nav-list-item"><div class="nav-item"><a href="#"><i class="fa-solid fa-home fa-xl" aria-hidden="true"></i></a></div></li>
                <li class="nav-list-item"><div class="nav-item"><a href="#"><i class="fa-solid fa-bandage fa-xl"></i></a></div></li>
                <li class="nav-list-item"><div class="nav-item"><a href="#"><i class="fa-solid fa-users fa-xl" aria-hidden="true"></i></a></div></li>
                <li class="nav-list-item"><div class="nav-item"><a href="#"><i class="fa-solid fa-hands-holding-child fa-xl" aria-hidden="true"></i></a></div></li>
                </ul>
            </div>
            </div>
        </div>
        <div class="container" id="icons-mobile">
            <div class="row">
            <div class="col-md-12 col-sm-12"><i class="fa-solid fa-bars fa-2xl"></i></div>
            </div>
        </div>
    </header>

    <main class="content">
        <h1>GT3 - Gallerie</h1>
        <div class="gallery-container">
            <div class="row">
                <div class="col-lg-4">
                    <model-viewer 
                        src="../../assets/2015_mclaren_650s_gt3.glb" 
                        alt="Ein 3D-Modell" 
                        auto-rotate 
                        camera-controls 
                        ar 
                        class="model-cars"
                        loading="lazy"
                        disable-zoom
                        environment-image="neutral"
                        exposure="0.2">
                    </model-viewer>
                </div>
                <div class="col-lg-4">
                    <model-viewer 
                        src="../../assets/2018_ferrari_488_gt3.glb" 
                        alt="Ein 3D-Modell" 
                        auto-rotate 
                        camera-controls 
                        ar 
                        class="model-cars"  
                        loading="lazy"
                        disable-zoom
                        environment-image="neutral"
                        exposure="0.2">
                    </model-viewer>
                </div>
                <div class="col-lg-4">
                    <model-viewer 
                        src="../../assets/2020_bentley_continental_gt3.glb" 
                        alt="Ein 3D-Modell" 
                        auto-rotate 
                        camera-controls 
                        ar 
                        class="model-cars"
                        loading="lazy"
                        disable-zoom
                        environment-image="neutral"
                        exposure="0.2">
                    </model-viewer>
                </div>
            </div>
            
        </div>
    </main>

  <div>
    <input type="color" id="colorPicker1" value="#21273d" />
    <div id="colorPreview1" style="width:100px; height:100px; border:1px solid #000; margin-top:10px; background-color:#21273d;"></div>
  </div>

  <div>
    <input type="color" id="colorPicker2" value="#b9d4f1" />
    <div id="colorPreview2" style="width:100px; height:100px; border:1px solid #000; margin-top:10px; background-color:#b9d4f1;"></div>
  </div>

  <div>
    <input type="color" id="colorPicker3" value="#252525" />
    <div id="colorPreview3" style="width:100px; height:100px; border:1px solid #000; margin-top:10px; background-color:#252525;"></div>
  </div>

<div class="cursor-shadow"></div>


    
         
<script>
    document.addEventListener('mousemove', function(e) {
    const cursorShadow = document.querySelector('.cursor-shadow');
    cursorShadow.style.left = `${e.pageX}px`;
    cursorShadow.style.top = `${e.pageY}px`;
  });
</script>

<script>
  for(let i=1; i<=3; i++){
    const picker = document.getElementById('colorPicker' + i);
    const preview = document.getElementById('colorPreview' + i);
    picker.addEventListener('input', () => {
      preview.style.backgroundColor = picker.value;
    });
  }
</script>
        
</body>
</html>
